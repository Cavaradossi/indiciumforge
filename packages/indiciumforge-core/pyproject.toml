[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "indiciumforge-core"
version = "2.0.1"
description = "Core contracts and output artifacts for reproducible financial research workflows."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "IndiciumForge contributors" }]
keywords = ["financial-research", "workflow", "artifacts", "open-core", "reproducibility"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "pandas>=2.0",
  "tabulate>=0.9",
  "pyyaml>=6.0",
  # `tomllib` is stdlib from 3.11; `tomli` backport keeps secrets.toml
  # support working on Python 3.10.
  "tomli>=2.0; python_version < '3.11'",
]

[project.optional-dependencies]
# Opt-in heavy deps for the DuckDB/Parquet time-series store.
# Core stays dependency-free; the [storage] extra is only needed to *use*
# ParquetDuckDBMarketDataStore.
storage = ["duckdb>=0.10", "pyarrow>=15"]
# Quant-substance extras — all optional, lazily imported by their adapters.
analytics = ["statsmodels>=0.14.4", "scipy>=1.14"]
portfolio = ["cvxpy>=1.5,<2.0"]
backtest = []   # vectorized backtest uses only numpy/pandas (already core deps)
pricing = []    # Black-Scholes analytic uses stdlib math.erf (zero extra deps)
data = ["akshare>=1.12", "lxml>=5.0"]
# Future: pricing-ql=["QuantLib>=1.36"]; backtest-engine=["rqalpha>=5.4"]

[project.urls]
Homepage = "https://github.com/Cavaradossi/indiciumforge"
Repository = "https://github.com/Cavaradossi/indiciumforge"
Documentation = "https://github.com/Cavaradossi/indiciumforge/tree/master/docs"
Issues = "https://github.com/Cavaradossi/indiciumforge/issues"
Changelog = "https://github.com/Cavaradossi/indiciumforge/blob/master/RELEASE_NOTES.md"

[tool.setuptools.packages.find]
where = ["src"]
