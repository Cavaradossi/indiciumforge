[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "indiciumforge-cli"
version = "2.0.1"
description = "CLI for IndiciumForge reproducible financial research workflows."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "IndiciumForge contributors" }]
keywords = ["financial-research", "workflow", "artifacts", "open-core", "reproducibility"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering",
  "Topic :: Software Development :: Libraries :: Application Frameworks",
]
dependencies = [
  "indiciumforge-workflow>=2.0.0,<3.0.0",
  "typer>=0.9",
]

[project.scripts]
indiciumforge = "indiciumforge_cli.main:app"

[project.urls]
Homepage = "https://github.com/Cavaradossi/indiciumforge"
Repository = "https://github.com/Cavaradossi/indiciumforge"
Documentation = "https://github.com/Cavaradossi/indiciumforge/tree/master/docs"
Issues = "https://github.com/Cavaradossi/indiciumforge/issues"
Changelog = "https://github.com/Cavaradossi/indiciumforge/blob/master/RELEASE_NOTES.md"

[tool.setuptools.packages.find]
where = ["src"]
