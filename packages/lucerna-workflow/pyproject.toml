[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lucerna-workflow"
version = "0.9.0"
description = "Workflow services for Lucerna."
requires-python = ">=3.10"
dependencies = ["lucerna-core", "pandas>=2.0", "pyyaml>=6.0", "tabulate>=0.9"]

[tool.setuptools.packages.find]
where = ["src"]
